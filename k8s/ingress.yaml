apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demystops-ingress
  namespace: demystops
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: demystops.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demystops-service
            port:
              number: 80
